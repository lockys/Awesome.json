<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Awesome Lists</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --accent: #58a6ff;
      --accent-dim: #1f6feb33;
      --text: #e6edf3;
      --muted: #8b949e;
      --tag-bg: #21262d;
      --radius: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 28px 24px 20px;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header h1 span { color: var(--accent); }

    header p {
      color: var(--muted);
      margin-top: 6px;
      font-size: 0.9rem;
    }

    /* ── Search + Stats bar ── */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }

    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    #search {
      width: 100%;
      padding: 8px 12px 8px 34px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }

    #stats {
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 0;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── Sidebar ── */
    aside {
      position: sticky;
      top: 53px;
      height: calc(100vh - 53px);
      overflow-y: auto;
      border-right: 1px solid var(--border);
      padding: 16px 0;
    }

    aside::-webkit-scrollbar { width: 4px; }
    aside::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .sidebar-title {
      padding: 0 16px 8px;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 600;
    }

    .cat-link {
      display: block;
      padding: 5px 16px;
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      border-left: 2px solid transparent;
      transition: color 0.1s, border-color 0.1s, background 0.1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cat-link:hover, .cat-link.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: var(--accent-dim);
    }

    /* ── Main content ── */
    main {
      padding: 24px;
      overflow: hidden;
    }

    /* ── Category section ── */
    .category {
      margin-bottom: 40px;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .category-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .count-badge {
      background: var(--tag-bg);
      color: var(--muted);
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    /* ── Entry grid ── */
    .entries {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
    }

    .entry {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color 0.15s, transform 0.1s;
    }

    .entry:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .entry-name {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--accent);
      word-break: break-word;
    }

    .entry-repo {
      font-size: 0.75rem;
      color: var(--muted);
      word-break: break-all;
    }

    /* ── Empty / loading ── */
    .state {
      grid-column: 1 / -1;
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── No results ── */
    .no-results {
      padding: 80px 20px;
      text-align: center;
      color: var(--muted);
    }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
      aside { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>✨ <span>Awesome</span> Lists</h1>
  <p>A curated collection of awesome GitHub lists, updated daily.</p>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="search" type="search" placeholder="Search lists…" autocomplete="off" />
  </div>
  <span id="stats"></span>
</div>

<div class="layout">
  <aside id="sidebar">
    <div class="sidebar-title">Categories</div>
  </aside>
  <main id="main">
    <div class="state"><div class="spinner"></div>Loading…</div>
  </main>
</div>

<script>
  const DATA_URL = './awesome/awesome.json';

  let allData = {};
  let query = '';

  async function load() {
    const res = await fetch(DATA_URL);
    allData = await res.json();
    render();
    buildSidebar();
  }

  function buildSidebar() {
    const aside = document.getElementById('sidebar');
    const cats = Object.keys(allData);
    const links = cats.map(cat => {
      const a = document.createElement('a');
      a.className = 'cat-link';
      a.href = '#cat-' + slug(cat);
      a.textContent = cat;
      a.title = cat;
      return a;
    });
    aside.append(...links);

    // highlight active category on scroll
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const id = e.target.id;
          links.forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#' + id));
        }
      });
    }, { rootMargin: '-10% 0px -80% 0px' });

    document.querySelectorAll('.category').forEach(el => observer.observe(el));
  }

  function slug(str) {
    return str.toLowerCase().replace(/[^a-z0-9]+/g, '-');
  }

  function render() {
    const main = document.getElementById('main');
    const q = query.toLowerCase().trim();

    let totalEntries = 0;
    let totalShown = 0;
    const sections = [];

    for (const [cat, entries] of Object.entries(allData)) {
      const filtered = q
        ? entries.filter(e =>
            e.name.toLowerCase().includes(q) ||
            e.repo.toLowerCase().includes(q) ||
            cat.toLowerCase().includes(q))
        : entries;

      totalEntries += entries.length;
      totalShown += filtered.length;

      if (filtered.length === 0) continue;

      const section = document.createElement('section');
      section.className = 'category';
      section.id = 'cat-' + slug(cat);

      section.innerHTML = `
        <div class="category-header">
          <h2>${escHtml(cat)}</h2>
          <span class="count-badge">${filtered.length}</span>
        </div>
        <div class="entries">
          ${filtered.map(e => `
            <a class="entry" href="${escHtml(e.url)}" target="_blank" rel="noopener">
              <span class="entry-name">${escHtml(e.name)}</span>
              <span class="entry-repo">${escHtml(e.repo)}</span>
            </a>`).join('')}
        </div>`;

      sections.push(section);
    }

    main.innerHTML = '';

    if (sections.length === 0) {
      main.innerHTML = '<div class="no-results">No results found.</div>';
    } else {
      main.append(...sections);
    }

    const statsEl = document.getElementById('stats');
    statsEl.textContent = q
      ? `${totalShown} of ${totalEntries} lists`
      : `${totalEntries} lists across ${Object.keys(allData).length} categories`;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  document.getElementById('search').addEventListener('input', e => {
    query = e.target.value;
    render();
  });

  load().catch(err => {
    document.getElementById('main').innerHTML =
      `<div class="state">Failed to load data.<br><small>${err.message}</small></div>`;
  });
</script>
</body>
</html>
